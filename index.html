<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── palette ─── */
const C = {
  bg: "#3A3A3A", bgLight: "#444", card: "#4A4A4A", cardLight: "#525252",
  court: "#F5F0E3", courtLine: "#C8C0B0",
  dark: "#1A1A1A", darkSoft: "#2C2C2C",
  green: "#5BBF3D", greenDark: "#3D8C28",
  red: "#E74C3C", redSoft: "#FF6B6B",
  orange: "#E8782A",
  gray: "#888", grayLight: "#AAA", grayUltra: "#555",
  white: "#F0F0F0", pureWhite: "#FFF",
  gold: "#F59E0B", silver: "#94A3B8", bronze: "#C2855A",
  accent: "#5BBF3D",
};
const FONT = "'SF Pro Display', 'Helvetica Neue', -apple-system, sans-serif";
const MONO = "'SF Mono', 'Menlo', monospace";

/* ─── 13 positions matching the court layout ─── */
const POSITIONS = [
  { id: 1, name: "Под кольцом (лево)", x: 39, y: 12 },
  { id: 2, name: "Под кольцом (право)", x: 56, y: 12 },
  { id: 3, name: "Центр под кольцом", x: 47.5, y: 22 },
  { id: 4, name: "Верх ключа (лево)", x: 27, y: 12 },
  { id: 5, name: "Штрафная (лево)", x: 33, y: 38 },
  { id: 6, name: "Штрафная (центр)", x: 47.5, y: 46 },
  { id: 7, name: "Штрафная (право)", x: 62, y: 38 },
  { id: 8, name: "Верх ключа (право)", x: 68, y: 12 },
  { id: 9, name: "Угол (лево)", x: 8, y: 12 },
  { id: 10, name: "Крыло (лево)", x: 14, y: 46 },
  { id: 11, name: "Трёхочковая (центр)", x: 47.5, y: 58 },
  { id: 12, name: "Крыло (право)", x: 82, y: 46 },
  { id: 13, name: "Угол (право)", x: 88, y: 12 },
];

/* ─── Random team names (Native American spirit) ─── */
const TEAM_NAMES = [
  "Серые Волки", "Ночные Ястребы", "Красные Орлы", "Тихие Бизоны",
  "Чёрные Пантеры", "Белые Медведи", "Горные Лисы", "Степные Койоты",
  "Громовые Совы", "Дикие Мустанги", "Речные Выдры", "Лунные Рыси",
  "Огненные Вороны", "Северные Лоси", "Каменные Барсы", "Быстрые Олени",
  "Вечерние Пумы", "Утренние Соколы", "Песчаные Скорпионы", "Лесные Филины",
];
function getRandomTeams() {
  const shuffled = [...TEAM_NAMES].sort(() => Math.random() - 0.5);
  return [shuffled[0], shuffled[1]];
}
function getRandomName() {
  return TEAM_NAMES[Math.floor(Math.random() * TEAM_NAMES.length)];
}

/* ─── Haptic feedback ─── */
function haptic(style = "light") {
  try {
    if (navigator.vibrate) {
      navigator.vibrate(style === "heavy" ? 30 : style === "medium" ? 15 : 8);
    }
  } catch (e) {}
}

/* ─── Utils ─── */
function fmtTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}
function fmtTimeFull(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}
function initStats() {
  const s = {};
  POSITIONS.forEach(p => { s[p.id] = { made: 0, missed: 0 }; });
  return s;
}

/* ─── Basketball SVG icon (B&W) ─── */
function BballIcon({ size = 28, active, filled }) {
  const color = active ? C.white : C.grayLight;
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" stroke={color} strokeWidth="2" fill={filled ? color : "none"} />
      {!filled && <>
        <path d="M16 2C16 2 16 30 16 30" stroke={color} strokeWidth="1.5" />
        <path d="M2 16C2 16 30 16 30 16" stroke={color} strokeWidth="1.5" />
        <path d="M5 5C10 10 10 22 5 27" stroke={color} strokeWidth="1.5" fill="none" />
        <path d="M27 5C22 10 22 22 27 27" stroke={color} strokeWidth="1.5" fill="none" />
      </>}
      {filled && <>
        <path d="M16 2C16 2 16 30 16 30" stroke={C.bg} strokeWidth="1.5" />
        <path d="M2 16C2 16 30 16 30 16" stroke={C.bg} strokeWidth="1.5" />
        <path d="M5 5C10 10 10 22 5 27" stroke={C.bg} strokeWidth="1.5" fill="none" />
        <path d="M27 5C22 10 22 22 27 27" stroke={C.bg} strokeWidth="1.5" fill="none" />
      </>}
    </svg>
  );
}

/* ─── Animated Button with press feedback ─── */
function PressBtn({ children, onClick, bg, color, full, disabled, style: sx, big }) {
  const [pressed, setPressed] = useState(false);
  const handlePress = () => {
    if (disabled) return;
    setPressed(true);
    haptic(big ? "heavy" : "light");
    onClick?.();
    setTimeout(() => setPressed(false), 150);
  };
  const pressedBg = bg === C.green ? C.greenDark : bg === C.red ? "#C0392B" : bg === C.dark ? "#000" : (bg || C.green) + "CC";
  return (
    <button disabled={disabled} onClick={handlePress} style={{
      width: full ? "100%" : "auto",
      padding: big ? "22px 24px" : "16px 24px",
      borderRadius: big ? 20 : 14, border: "none",
      background: pressed ? pressedBg : disabled ? C.grayUltra : (bg || C.green),
      color: disabled ? C.gray : (color || C.pureWhite),
      fontFamily: FONT, fontSize: big ? 20 : 16, fontWeight: 700,
      cursor: disabled ? "default" : "pointer",
      opacity: disabled ? 0.4 : 1,
      transition: "all 0.1s ease-out",
      transform: pressed ? "scale(0.96)" : "scale(1)",
      ...sx,
    }}>{children}</button>
  );
}

/* ─── Small tap button ─── */
function TapBtn({ children, onClick, bg, color, style: sx }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button onClick={() => { setPressed(true); haptic(); onClick?.(); setTimeout(() => setPressed(false), 120); }} style={{
      padding: "8px 16px", borderRadius: 10, border: "none",
      background: pressed ? (bg || C.cardLight) + "99" : (bg || C.cardLight),
      color: color || C.white, fontFamily: FONT, fontSize: 13, fontWeight: 600,
      cursor: "pointer", transition: "all 0.1s", transform: pressed ? "scale(0.95)" : "scale(1)", ...sx,
    }}>{children}</button>
  );
}

/* ─── Cards ─── */
function Card({ children, style: sx }) {
  return <div style={{ background: C.card, borderRadius: 16, padding: "16px 18px", ...sx }}>{children}</div>;
}
function SectionLabel({ children }) {
  return <div style={{ fontSize: 11, color: C.grayLight, fontWeight: 600, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>{children}</div>;
}

/* ─── Number Stepper ─── */
function NumberStepper({ label, value, onChange, min = 1, max = 99, unit }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <span style={{ fontSize: 14, color: C.white, fontWeight: 500 }}>{label}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <TapBtn onClick={() => onChange(Math.max(min, value - 1))} bg={C.cardLight} style={{ width: 36, height: 36, padding: 0, borderRadius: 10, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>−</TapBtn>
        <span style={{ fontSize: 20, fontWeight: 800, fontFamily: MONO, minWidth: 36, textAlign: "center", color: C.white }}>{value}</span>
        <TapBtn onClick={() => onChange(Math.min(max, value + 1))} bg={C.cardLight} style={{ width: 36, height: 36, padding: 0, borderRadius: 10, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>+</TapBtn>
        {unit && <span style={{ fontSize: 12, color: C.gray }}>{unit}</span>}
      </div>
    </div>
  );
}

/* ─── Tab Bar ─── */
function TabBar({ active, onTab }) {
  const tabs = [
    { id: "training", label: "Тренировка" },
    { id: "game", label: "Матч" },
    { id: "history", label: "История" },
    { id: "profile", label: "Профиль" },
  ];
  return (
    <div style={{ display: "flex", justifyContent: "space-around", background: C.dark, padding: "10px 0 4px" }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => { haptic(); onTab(t.id); }} style={{
          background: "none", border: "none", display: "flex", flexDirection: "column",
          alignItems: "center", gap: 4, cursor: "pointer", padding: "4px 12px", fontFamily: FONT,
        }}>
          <BballIcon size={26} active={active === t.id} filled={active === t.id} />
          <span style={{ fontSize: 10, fontWeight: 600, color: active === t.id ? C.white : C.gray }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ─── Court SVG — accurate layout from design ─── */
function CourtSVG({ stats, selectedPos, onSelectPos, disabled }) {
  return (
    <svg viewBox="0 0 95 66" style={{ width: "100%", display: "block", opacity: disabled ? 0.5 : 1 }}>
      {/* Court bg */}
      <rect x="0" y="0" width="95" height="66" rx="6" fill={C.court} />

      {/* Baseline */}
      <line x1="5" y1="4" x2="90" y2="4" stroke={C.courtLine} strokeWidth="0.6" />
      {/* Sidelines */}
      <line x1="5" y1="4" x2="5" y2="66" stroke={C.courtLine} strokeWidth="0.6" />
      <line x1="90" y1="4" x2="90" y2="66" stroke={C.courtLine} strokeWidth="0.6" />

      {/* Paint / key rectangle */}
      <rect x="30" y="4" width="35" height="32" fill="none" stroke={C.courtLine} strokeWidth="0.6" />
      {/* Inner box */}
      <rect x="37" y="4" width="21" height="18" fill="none" stroke={C.courtLine} strokeWidth="0.5" />

      {/* Free throw circle */}
      <circle cx="47.5" cy="36" r="11" fill="none" stroke={C.courtLine} strokeWidth="0.5" />

      {/* Three-point arc */}
      <path d="M 5 14 Q 5 62 47.5 62 Q 90 62 90 14" fill="none" stroke={C.courtLine} strokeWidth="0.6" />

      {/* Backboard */}
      <line x1="41" y1="3" x2="54" y2="3" stroke={C.dark} strokeWidth="1.2" />
      {/* Basket ring */}
      <circle cx="47.5" cy="6.5" r="2" fill="none" stroke={C.orange} strokeWidth="0.8" />

      {/* Position dots */}
      {POSITIONS.map(p => {
        const s = stats[p.id] || { made: 0, missed: 0 };
        const total = s.made + s.missed;
        const pct = total > 0 ? Math.round((s.made / total) * 100) : null;
        const isSelected = selectedPos === p.id;
        const r = 4;
        const dotBg = isSelected ? C.green :
          pct === null ? C.darkSoft :
          pct >= 70 ? C.green : pct >= 40 ? C.orange : C.red;

        return (
          <g key={p.id} onClick={() => { if (!disabled) { haptic(); onSelectPos(p.id); } }} style={{ cursor: disabled ? "default" : "pointer" }}>
            {isSelected && <circle cx={p.x} cy={p.y} r={r + 2.5} fill={C.green} opacity="0.2" />}
            <circle cx={p.x} cy={p.y} r={r} fill={dotBg} stroke="rgba(0,0,0,0.2)" strokeWidth="0.3" />
            <text x={p.x} y={p.y + 1.5} textAnchor="middle" fontSize="4" fontWeight="800" fill={C.pureWhite} fontFamily={MONO} style={{ pointerEvents: "none" }}>
              {pct !== null ? pct : p.id}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

/* ─── Position info card ─── */
function PosCard({ pos, stat }) {
  if (!pos) return null;
  const total = stat.made + stat.missed;
  const pct = total > 0 ? Math.round((stat.made / total) * 100) : 0;
  return (
    <Card>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 10, color: C.gray }}>ПОЗИЦИЯ {pos.id}</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.white }}>{pos.name}</div>
        </div>
        <div style={{ fontSize: 28, fontWeight: 900, fontFamily: MONO, color: pct >= 70 ? C.green : pct >= 40 ? C.orange : total > 0 ? C.red : C.gray }}>
          {pct}<span style={{ fontSize: 13 }}>%</span>
        </div>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        {[{ v: stat.made, l: "попал", c: C.green }, { v: stat.missed, l: "мимо", c: C.red }, { v: total, l: "всего", c: C.white }].map((d, i) => (
          <div key={i} style={{ flex: 1, background: C.bgLight, borderRadius: 10, padding: "6px 8px", textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: d.c, fontFamily: MONO }}>{d.v}</div>
            <div style={{ fontSize: 9, color: C.gray }}>{d.l}</div>
          </div>
        ))}
      </div>
    </Card>
  );
}


/* ═══════════════════════════════════
   TRAINING SCREEN
   ═══════════════════════════════════ */
function TrainingScreen({ onSaveSession }) {
  const [phase, setPhase] = useState("idle");
  const [selectedPos, setSelectedPos] = useState(null);
  const [stats, setStats] = useState(initStats);
  const [timer, setTimer] = useState(0);
  const [timerRunning, setTimerRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (timerRunning) { intervalRef.current = setInterval(() => setTimer(t => t + 1), 1000); }
    else clearInterval(intervalRef.current);
    return () => clearInterval(intervalRef.current);
  }, [timerRunning]);

  const totalMade = Object.values(stats).reduce((a, b) => a + b.made, 0);
  const totalMissed = Object.values(stats).reduce((a, b) => a + b.missed, 0);
  const totalShots = totalMade + totalMissed;
  const totalPct = totalShots > 0 ? Math.round((totalMade / totalShots) * 100) : 0;

  const handleShot = (made) => {
    if (!selectedPos || phase !== "active") return;
    haptic(made ? "medium" : "light");
    setStats(prev => ({ ...prev, [selectedPos]: { ...prev[selectedPos], made: prev[selectedPos].made + (made ? 1 : 0), missed: prev[selectedPos].missed + (made ? 0 : 1) } }));
  };

  const startTraining = () => { setPhase("active"); setTimerRunning(true); haptic("heavy"); };
  const finishTraining = () => {
    setTimerRunning(false); haptic("heavy");
    onSaveSession?.({ type: "training", stats: { ...stats }, timer, totalMade, totalMissed, totalPct, date: Date.now() });
    setPhase("summary");
  };
  const resetTraining = () => { setPhase("idle"); setSelectedPos(null); setStats(initStats()); setTimer(0); };

  /* Summary */
  if (phase === "summary") {
    const used = POSITIONS.filter(p => stats[p.id].made + stats[p.id].missed > 0);
    return (
      <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
        <Card style={{ textAlign: "center", marginBottom: 16, background: C.dark, padding: 24 }}>
          <div style={{ fontSize: 11, color: C.gray, textTransform: "uppercase", marginBottom: 4 }}>Тренировка завершена</div>
          <div style={{ fontSize: 52, fontWeight: 900, fontFamily: MONO, color: C.white }}>{totalPct}<span style={{ fontSize: 20, opacity: 0.5 }}>%</span></div>
          <div style={{ fontSize: 13, color: C.gray, marginBottom: 16 }}>{fmtTimeFull(timer)}</div>
          <div style={{ display: "flex", justifyContent: "center", gap: 24 }}>
            {[{ v: totalMade, l: "попал", c: C.green }, { v: totalMissed, l: "мимо", c: C.redSoft }, { v: totalShots, l: "всего", c: C.white }].map((d, i) => (
              <div key={i}><div style={{ fontSize: 22, fontWeight: 800, fontFamily: MONO, color: d.c }}>{d.v}</div><div style={{ fontSize: 10, color: C.gray }}>{d.l}</div></div>
            ))}
          </div>
        </Card>
        <Card style={{ marginBottom: 12, padding: 10 }}><CourtSVG stats={stats} selectedPos={null} onSelectPos={() => {}} disabled /></Card>
        {used.length > 0 && (<div style={{ marginBottom: 12 }}><SectionLabel>По позициям</SectionLabel>
          {used.map(p => { const s = stats[p.id], t = s.made + s.missed, pct = Math.round((s.made / t) * 100); return (
            <div key={p.id} style={{ background: C.card, borderRadius: 12, padding: "10px 14px", marginBottom: 6, display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: pct >= 70 ? "rgba(91,191,61,0.15)" : pct >= 40 ? "rgba(232,120,42,0.15)" : "rgba(231,76,60,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, fontFamily: MONO, color: pct >= 70 ? C.green : pct >= 40 ? C.orange : C.red }}>{pct}</div>
              <div style={{ flex: 1, fontSize: 13, fontWeight: 600, color: C.white }}>{p.name}</div>
              <div style={{ fontSize: 12, fontFamily: MONO, color: C.white }}><span style={{ color: C.green }}>{s.made}</span>/{t}</div>
            </div>); })}
        </div>)}
        <PressBtn full bg={C.green} onClick={resetTraining}>Новая тренировка</PressBtn>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, overflowY: "auto" }}>
      {phase === "active" && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 16px", background: C.dark }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ fontSize: 24, fontWeight: 800, fontFamily: MONO, color: C.white }}>{fmtTimeFull(timer)}</div>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: timerRunning ? C.green : C.gray, boxShadow: timerRunning ? `0 0 8px ${C.green}` : "none" }} />
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <TapBtn onClick={() => setTimerRunning(!timerRunning)} bg={timerRunning ? "rgba(231,76,60,0.2)" : "rgba(91,191,61,0.2)"} color={timerRunning ? C.red : C.green}>
              {timerRunning ? "⏸" : "▶"}
            </TapBtn>
            <TapBtn onClick={finishTraining} bg={C.red} color={C.pureWhite}>■ Стоп</TapBtn>
          </div>
        </div>
      )}
      {phase === "active" && (
        <div style={{ display: "flex", gap: 1, background: C.dark }}>
          {[{ l: "Бросков", v: totalShots, c: C.white }, { l: "Попал", v: totalMade, c: C.green }, { l: "Мимо", v: totalMissed, c: C.red }, { l: "%", v: `${totalPct}`, c: totalPct >= 60 ? C.green : C.orange }].map((s, i) => (
            <div key={i} style={{ flex: 1, background: C.card, padding: "8px 4px", textAlign: "center" }}>
              <div style={{ fontSize: 18, fontWeight: 800, fontFamily: MONO, color: s.c }}>{s.v}</div>
              <div style={{ fontSize: 9, color: C.gray, fontWeight: 600 }}>{s.l}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{ padding: "12px 16px 8px" }}><CourtSVG stats={stats} selectedPos={selectedPos} onSelectPos={setSelectedPos} /></div>
      <div style={{ padding: "0 16px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
        {selectedPos && <PosCard pos={POSITIONS.find(p => p.id === selectedPos)} stat={stats[selectedPos]} />}
        {phase === "idle" && selectedPos && <PressBtn full bg={C.green} onClick={startTraining}>▶ Начать тренировку</PressBtn>}
        {phase === "idle" && !selectedPos && (
          <Card style={{ textAlign: "center", padding: "28px 20px", border: `1px dashed ${C.grayUltra}`, background: "transparent" }}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>👆</div>
            <div style={{ fontSize: 15, fontWeight: 600, color: C.white }}>Выберите позицию</div>
            <div style={{ fontSize: 12, color: C.gray, marginTop: 4 }}>Нажмите на точку на площадке</div>
          </Card>
        )}
        {phase === "active" && selectedPos && (
          <div style={{ display: "flex", gap: 10 }}>
            <PressBtn full big bg={C.green} onClick={() => handleShot(true)}>✓ Попал</PressBtn>
            <PressBtn full big bg={C.dark} onClick={() => handleShot(false)}>✕ Мимо</PressBtn>
          </div>
        )}
        {phase === "active" && !selectedPos && (
          <Card style={{ textAlign: "center", background: "rgba(91,191,61,0.08)", border: "1px solid rgba(91,191,61,0.15)" }}>
            <div style={{ fontSize: 13, color: C.green, fontWeight: 600 }}>Выберите позицию для бросков</div>
          </Card>
        )}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════
   GAME SCREEN
   ═══════════════════════════════════ */
function GameScreen({ onSaveSession }) {
  const [step, setStep] = useState("choose_mode");
  const [teamA, setTeamA] = useState({ name: "", score: 0 });
  const [teamB, setTeamB] = useState({ name: "", score: 0 });
  const [quarters, setQuarters] = useState(4);
  const [quarterMin, setQuarterMin] = useState(10);
  const [currentQuarter, setCurrentQuarter] = useState(1);
  const [timer, setTimer] = useState(600);
  const [timerRunning, setTimerRunning] = useState(false);
  const [history, setHistory] = useState([]);
  const [tournamentTeams, setTournamentTeams] = useState(() => ["", "", "", ""].map(() => getRandomName()));
  const [bracketType, setBracketType] = useState("olympic");
  const [tournamentMatches, setTournamentMatches] = useState([]);
  const [currentMatchIdx, setCurrentMatchIdx] = useState(0);
  const [matchTeamA, setMatchTeamA] = useState({ name: "", score: 0 });
  const [matchTeamB, setMatchTeamB] = useState({ name: "", score: 0 });
  const [matchHistory, setMatchHistory] = useState([]);
  const intervalRef = useRef(null);

  // Init random team names
  useEffect(() => {
    const [a, b] = getRandomTeams();
    setTeamA({ name: a, score: 0 });
    setTeamB({ name: b, score: 0 });
  }, []);

  useEffect(() => {
    if (timerRunning && timer > 0) {
      intervalRef.current = setInterval(() => setTimer(t => { if (t <= 1) { setTimerRunning(false); return 0; } return t - 1; }), 1000);
    } else clearInterval(intervalRef.current);
    return () => clearInterval(intervalRef.current);
  }, [timerRunning, timer]);

  const addScore = (team, pts) => {
    haptic("medium");
    const isMatch = step === "match_playing";
    if (team === "a") (isMatch ? setMatchTeamA : setTeamA)(prev => ({ ...prev, score: prev.score + pts }));
    else (isMatch ? setMatchTeamB : setTeamB)(prev => ({ ...prev, score: prev.score + pts }));
    (isMatch ? setMatchHistory : setHistory)(prev => [...prev, { team, pts, quarter: currentQuarter, time: timer }]);
  };

  const undoLast = () => {
    const isMatch = step === "match_playing";
    const hist = isMatch ? matchHistory : history;
    if (!hist.length) return;
    haptic();
    const last = hist[hist.length - 1];
    const setter = last.team === "a" ? (isMatch ? setMatchTeamA : setTeamA) : (isMatch ? setMatchTeamB : setTeamB);
    setter(prev => ({ ...prev, score: Math.max(0, prev.score - last.pts) }));
    (isMatch ? setMatchHistory : setHistory)(prev => prev.slice(0, -1));
  };

  const generateMatches = (teams, type) => {
    const valid = teams.filter(t => t.trim());
    if (type === "round_robin") {
      const m = [];
      for (let i = 0; i < valid.length; i++) for (let j = i + 1; j < valid.length; j++) m.push({ a: valid[i], b: valid[j], scoreA: 0, scoreB: 0, done: false });
      return m;
    }
    const sh = [...valid].sort(() => Math.random() - 0.5);
    const m = [];
    for (let i = 0; i < sh.length - 1; i += 2) m.push({ a: sh[i], b: sh[i + 1], scoreA: 0, scoreB: 0, done: false, round: 1 });
    if (sh.length % 2) m.push({ a: sh[sh.length - 1], b: "BYE", scoreA: 1, scoreB: 0, done: true, round: 1 });
    return m;
  };

  const startMatch = (idx) => {
    const m = tournamentMatches[idx];
    setMatchTeamA({ name: m.a, score: 0 }); setMatchTeamB({ name: m.b, score: 0 });
    setCurrentQuarter(1); setTimer(quarterMin * 60); setTimerRunning(false); setMatchHistory([]); setCurrentMatchIdx(idx); setStep("match_playing");
  };

  const finishMatch = () => {
    setTimerRunning(false); haptic("heavy");
    const updated = [...tournamentMatches];
    updated[currentMatchIdx] = { ...updated[currentMatchIdx], scoreA: matchTeamA.score, scoreB: matchTeamB.score, done: true };
    if (bracketType === "olympic") {
      const r = updated[currentMatchIdx].round, rm = updated.filter(m => m.round === r);
      if (rm.every(m => m.done) && rm.length > 1) {
        const w = rm.map(m => m.scoreA >= m.scoreB ? m.a : m.b);
        for (let i = 0; i < w.length - 1; i += 2) updated.push({ a: w[i], b: w[i + 1], scoreA: 0, scoreB: 0, done: false, round: r + 1 });
        if (w.length % 2) updated.push({ a: w[w.length - 1], b: "BYE", scoreA: 1, scoreB: 0, done: true, round: r + 1 });
      }
    }
    setTournamentMatches(updated);
    const allDone = updated.findIndex(m => !m.done) === -1;
    if (allDone) {
      onSaveSession?.({ type: "tournament", bracketType, matches: updated, teams: tournamentTeams.filter(t => t.trim()), date: Date.now() });
    }
    setStep(allDone ? "tournament_results" : "match_list");
  };

  const fullReset = () => {
    const [a, b] = getRandomTeams();
    setStep("choose_mode"); setTeamA({ name: a, score: 0 }); setTeamB({ name: b, score: 0 });
    setQuarters(4); setQuarterMin(10); setCurrentQuarter(1); setTimer(600); setTimerRunning(false); setHistory([]);
    setTournamentTeams(["", "", "", ""].map(() => getRandomName())); setBracketType("olympic");
    setTournamentMatches([]); setCurrentMatchIdx(0); setMatchHistory([]);
  };

  /* Scoreboard with BIG buttons */
  const Scoreboard = ({ tA, tB }) => (
    <div style={{ display: "flex", margin: "0 12px", borderRadius: 20, overflow: "hidden", background: C.card }}>
      {[{ team: tA, key: "a" }, { team: tB, key: "b" }].map((item, i) => (
        <div key={i} style={{ flex: 1, padding: "14px 8px", textAlign: "center", borderRight: i === 0 ? `1px solid ${C.bg}` : "none" }}>
          <div style={{ fontSize: 11, color: C.gray, fontWeight: 600, marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.team.name}</div>
          <div style={{ fontSize: 48, fontWeight: 900, fontFamily: MONO, color: C.white, lineHeight: 1, marginBottom: 12 }}>{item.team.score}</div>
          <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
            {[1, 2, 3].map(pts => (
              <PressBtn key={pts} big bg={pts === 3 ? C.green : pts === 2 ? C.cardLight : C.bgLight} color={C.pureWhite}
                onClick={() => addScore(item.key, pts)} style={{ width: 56, height: 56, padding: 0, borderRadius: 14, fontSize: 20 }}>
                +{pts}
              </PressBtn>
            ))}
          </div>
        </div>
      ))}
    </div>
  );

  /* Timer bar for game modes */
  const TimerBar = ({ q, maxQ, onNext }) => (
    <div style={{ textAlign: "center", padding: "10px 16px 8px" }}>
      <div style={{ fontSize: 10, color: C.gray, fontWeight: 600, textTransform: "uppercase" }}>Четверть {q} из {maxQ}</div>
      <div style={{ fontSize: 52, fontWeight: 900, fontFamily: MONO, color: C.white, lineHeight: 1 }}>{fmtTime(timer)}</div>
      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 10 }}>
        <PressBtn bg={timerRunning ? C.red : C.green} onClick={() => { setTimerRunning(!timerRunning); haptic("medium"); }}>
          {timerRunning ? "⏸ Пауза" : "▶ Старт"}
        </PressBtn>
        <PressBtn bg={C.cardLight} onClick={onNext}>{q < maxQ ? "След. →" : "Завершить"}</PressBtn>
      </div>
    </div>
  );

  /* Choose Mode */
  if (step === "choose_mode") return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <BballIcon size={56} active />
        <div style={{ fontSize: 18, fontWeight: 800, color: C.white, marginTop: 12 }}>Выберите режим</div>
      </div>
      {[{ id: "friendly", icon: "🤝", title: "Товарищеская игра", desc: "Один матч" },
        { id: "tournament", icon: "🏆", title: "Турнир", desc: "Жеребьёвка и финал" }].map(m => (
        <PressBtn key={m.id} full bg={C.card} color={C.white} onClick={() => setStep(m.id === "friendly" ? "friendly_teams" : "tournament_teams")}
          style={{ marginBottom: 10, textAlign: "left", display: "flex", alignItems: "center", gap: 14, padding: "18px 20px" }}>
          <span style={{ fontSize: 28 }}>{m.icon}</span>
          <div><div style={{ fontSize: 15, fontWeight: 700 }}>{m.title}</div><div style={{ fontSize: 12, color: C.gray, fontWeight: 400 }}>{m.desc}</div></div>
        </PressBtn>
      ))}
    </div>
  );

  /* Friendly Teams */
  if (step === "friendly_teams") return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
      <TapBtn onClick={() => setStep("choose_mode")} bg="transparent" color={C.green} style={{ marginBottom: 16, padding: "4px 0" }}>← Назад</TapBtn>
      <div style={{ fontSize: 18, fontWeight: 800, color: C.white, textAlign: "center", marginBottom: 20 }}>Команды</div>
      {[{ t: teamA, set: setTeamA, l: "Команда 1" }, { t: teamB, set: setTeamB, l: "Команда 2" }].map((item, i) => (
        <Card key={i} style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: C.gray, fontWeight: 600, marginBottom: 6 }}>{item.l}</div>
          <input value={item.t.name} onChange={e => item.set(prev => ({ ...prev, name: e.target.value }))} style={{
            width: "100%", padding: "12px 14px", borderRadius: 10, border: "none", background: C.bgLight,
            fontSize: 16, fontWeight: 600, fontFamily: FONT, color: C.white, outline: "none", boxSizing: "border-box",
          }} />
        </Card>
      ))}
      <PressBtn full onClick={() => setStep("friendly_settings")} style={{ marginTop: 8 }}>Далее →</PressBtn>
    </div>
  );

  /* Friendly Settings */
  if (step === "friendly_settings") return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
      <TapBtn onClick={() => setStep("friendly_teams")} bg="transparent" color={C.green} style={{ marginBottom: 16, padding: "4px 0" }}>← Назад</TapBtn>
      <div style={{ fontSize: 18, fontWeight: 800, color: C.white, textAlign: "center", marginBottom: 4 }}>Настройки</div>
      <div style={{ fontSize: 13, color: C.gray, textAlign: "center", marginBottom: 20 }}>{teamA.name} vs {teamB.name}</div>
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <NumberStepper label="Четвертей" value={quarters} onChange={setQuarters} min={1} max={8} />
          <div style={{ height: 1, background: C.grayUltra }} />
          <NumberStepper label="Минут" value={quarterMin} onChange={setQuarterMin} min={1} max={30} unit="мин" />
        </div>
      </Card>
      <PressBtn full onClick={() => { setCurrentQuarter(1); setTimer(quarterMin * 60); setTeamA(p => ({ ...p, score: 0 })); setTeamB(p => ({ ...p, score: 0 })); setHistory([]); setStep("playing"); }}>
        🏀 Начать
      </PressBtn>
    </div>
  );

  /* Playing */
  if (step === "playing") return (
    <div style={{ flex: 1, overflowY: "auto" }}>
      <TimerBar q={currentQuarter} maxQ={quarters} onNext={() => {
        if (currentQuarter < quarters) { setCurrentQuarter(q => q + 1); setTimer(quarterMin * 60); setTimerRunning(false); }
        else { setTimerRunning(false); haptic("heavy"); onSaveSession?.({ type: "friendly", teamA: { ...teamA }, teamB: { ...teamB }, date: Date.now() }); setStep("finished"); }
      }} />
      <Scoreboard tA={teamA} tB={teamB} />
      <div style={{ textAlign: "center", padding: 10 }}>
        {history.length > 0 && <TapBtn onClick={undoLast} bg="transparent" color={C.gray}>↩ Отменить</TapBtn>}
      </div>
    </div>
  );

  /* Finished */
  if (step === "finished") {
    const winner = teamA.score > teamB.score ? teamA : teamB.score > teamA.score ? teamB : null;
    return (
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
        <Card style={{ textAlign: "center", background: C.dark, padding: 24, marginBottom: 16 }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>🏆</div>
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 20 }}>
            <div><div style={{ fontSize: 11, color: C.gray }}>{teamA.name}</div><div style={{ fontSize: 44, fontWeight: 900, fontFamily: MONO, color: C.white }}>{teamA.score}</div></div>
            <div style={{ fontSize: 18, color: C.gray }}>—</div>
            <div><div style={{ fontSize: 11, color: C.gray }}>{teamB.name}</div><div style={{ fontSize: 44, fontWeight: 900, fontFamily: MONO, color: C.white }}>{teamB.score}</div></div>
          </div>
          {winner && <div style={{ marginTop: 10, fontSize: 14, color: C.green, fontWeight: 700 }}>🎉 {winner.name}</div>}
        </Card>
        <PressBtn full bg={C.card} onClick={fullReset}>Новая игра</PressBtn>
      </div>
    );
  }

  /* Tournament Teams */
  if (step === "tournament_teams") return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
      <TapBtn onClick={() => setStep("choose_mode")} bg="transparent" color={C.green} style={{ marginBottom: 16, padding: "4px 0" }}>← Назад</TapBtn>
      <div style={{ fontSize: 18, fontWeight: 800, color: C.white, textAlign: "center", marginBottom: 20 }}>Команды турнира</div>
      {tournamentTeams.map((t, i) => (
        <Card key={i} style={{ marginBottom: 8, padding: "10px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 26, height: 26, borderRadius: 7, background: C.bgLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, fontFamily: MONO, color: C.white }}>{i + 1}</div>
            <input value={t} onChange={e => { const u = [...tournamentTeams]; u[i] = e.target.value; setTournamentTeams(u); }}
              style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: "none", background: C.bgLight, fontSize: 14, fontWeight: 600, fontFamily: FONT, color: C.white, outline: "none", boxSizing: "border-box" }} />
            {tournamentTeams.length > 3 && (
              <TapBtn onClick={() => setTournamentTeams(prev => prev.filter((_, j) => j !== i))} bg="rgba(231,76,60,0.15)" color={C.red} style={{ width: 26, height: 26, padding: 0, borderRadius: 7, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>×</TapBtn>
            )}
          </div>
        </Card>
      ))}
      {tournamentTeams.length < 8 && (
        <TapBtn onClick={() => setTournamentTeams(prev => [...prev, getRandomName()])} bg="transparent" color={C.green} style={{ width: "100%", padding: 12, border: `1px dashed ${C.grayUltra}`, borderRadius: 12, marginBottom: 12 }}>+ Добавить</TapBtn>
      )}
      <PressBtn full disabled={tournamentTeams.filter(t => t.trim()).length < 3} onClick={() => setStep("tournament_bracket")}>Далее →</PressBtn>
    </div>
  );

  /* Tournament Bracket */
  if (step === "tournament_bracket") {
    const valid = tournamentTeams.filter(t => t.trim());
    const mc = bracketType === "round_robin" ? (valid.length * (valid.length - 1)) / 2 : valid.length - 1;
    return (
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
        <TapBtn onClick={() => setStep("tournament_teams")} bg="transparent" color={C.green} style={{ marginBottom: 16, padding: "4px 0" }}>← Назад</TapBtn>
        <div style={{ fontSize: 18, fontWeight: 800, color: C.white, textAlign: "center", marginBottom: 20 }}>Формат</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {[{ id: "olympic", icon: "🏅", t: "Олимпийская", d: "На вылет" }, { id: "round_robin", icon: "🔄", t: "Круговая", d: "Все со всеми" }].map(b => (
            <PressBtn key={b.id} full bg={bracketType === b.id ? C.green : C.card} onClick={() => setBracketType(b.id)}
              style={{ padding: "14px 10px", textAlign: "center", display: "block" }}>
              <div style={{ fontSize: 22 }}>{b.icon}</div>
              <div style={{ fontSize: 13, fontWeight: 700, marginTop: 4 }}>{b.t}</div>
              <div style={{ fontSize: 10, opacity: 0.7, fontWeight: 400 }}>{b.d}</div>
            </PressBtn>
          ))}
        </div>
        <Card style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <NumberStepper label="Четвертей" value={quarters} onChange={setQuarters} min={1} max={8} />
            <div style={{ height: 1, background: C.grayUltra }} />
            <NumberStepper label="Минут" value={quarterMin} onChange={setQuarterMin} min={1} max={30} unit="мин" />
          </div>
        </Card>
        <PressBtn full onClick={() => { setTournamentMatches(generateMatches(tournamentTeams, bracketType)); setStep("match_list"); }}>🏆 Начать турнир</PressBtn>
      </div>
    );
  }

  /* Match List */
  if (step === "match_list") {
    const done = tournamentMatches.filter(m => m.done).length, next = tournamentMatches.findIndex(m => !m.done);
    return (
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
        <div style={{ textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: C.white }}>Матчи</div>
          <div style={{ fontSize: 12, color: C.gray, marginTop: 4 }}>{done} / {tournamentMatches.length}</div>
          <div style={{ height: 4, borderRadius: 2, background: C.card, marginTop: 10, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${(done / tournamentMatches.length) * 100}%`, background: C.green, borderRadius: 2 }} />
          </div>
        </div>
        {tournamentMatches.map((m, i) => (
          <Card key={i} style={{ marginBottom: 8, opacity: m.done ? 0.6 : 1, padding: "12px 14px", border: i === next ? `2px solid ${C.green}` : "none" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: C.white, flex: 1, textAlign: "right" }}>{m.a}</span>
              {m.done ? <span style={{ fontSize: 16, fontWeight: 900, fontFamily: MONO, color: C.white, minWidth: 50, textAlign: "center" }}>{m.scoreA}:{m.scoreB}</span>
                : <span style={{ fontSize: 13, color: C.gray, minWidth: 30, textAlign: "center" }}>vs</span>}
              <span style={{ fontSize: 13, fontWeight: 700, color: C.white, flex: 1, textAlign: "left" }}>{m.b}</span>
            </div>
          </Card>
        ))}
        {next !== -1 && <PressBtn full onClick={() => startMatch(next)} style={{ marginTop: 8 }}>▶ Матч {next + 1}</PressBtn>}
      </div>
    );
  }

  /* Match Playing */
  if (step === "match_playing") return (
    <div style={{ flex: 1, overflowY: "auto" }}>
      <TimerBar q={currentQuarter} maxQ={quarters} onNext={() => {
        if (currentQuarter < quarters) { setCurrentQuarter(q => q + 1); setTimer(quarterMin * 60); setTimerRunning(false); }
        else finishMatch();
      }} />
      <Scoreboard tA={matchTeamA} tB={matchTeamB} />
      <div style={{ textAlign: "center", padding: 10 }}>{matchHistory.length > 0 && <TapBtn onClick={undoLast} bg="transparent" color={C.gray}>↩ Отменить</TapBtn>}</div>
    </div>
  );

  /* Tournament Results */
  if (step === "tournament_results") {
    const standings = {};
    tournamentTeams.filter(t => t.trim()).forEach(t => { standings[t] = { w: 0, l: 0, scored: 0 }; });
    tournamentMatches.filter(m => m.done && m.b !== "BYE").forEach(m => {
      if (standings[m.a]) standings[m.a].scored += m.scoreA;
      if (standings[m.b]) standings[m.b].scored += m.scoreB;
      if (m.scoreA > m.scoreB) { if (standings[m.a]) standings[m.a].w++; if (standings[m.b]) standings[m.b].l++; }
      else if (m.scoreB > m.scoreA) { if (standings[m.b]) standings[m.b].w++; if (standings[m.a]) standings[m.a].l++; }
    });
    const sorted = Object.entries(standings).sort((a, b) => b[1].w - a[1].w || b[1].scored - a[1].scored);
    const medals = [C.gold, C.silver, C.bronze];
    return (
      <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
        <div style={{ textAlign: "center", marginBottom: 16 }}><div style={{ fontSize: 40 }}>🏆</div><div style={{ fontSize: 18, fontWeight: 800, color: C.white }}>Итоги</div></div>
        <Card style={{ marginBottom: 16, padding: 16 }}>
          {sorted.map(([name, s], i) => (
            <div key={name} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < sorted.length - 1 ? `1px solid ${C.bgLight}` : "none" }}>
              <div style={{ width: 24, height: 24, borderRadius: 6, background: i < 3 ? medals[i] : C.bgLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, fontFamily: MONO, color: i < 3 ? C.dark : C.white }}>{i + 1}</div>
              <div style={{ flex: 1, fontSize: 14, fontWeight: 600, color: C.white }}>{name}</div>
              <div style={{ fontSize: 11, color: C.gray }}>{s.w}W–{s.l}L</div>
              <div style={{ fontSize: 14, fontWeight: 800, fontFamily: MONO, color: C.white }}>{s.scored}</div>
            </div>
          ))}
        </Card>
        <SectionLabel>Матчи</SectionLabel>
        {tournamentMatches.filter(m => m.done && m.b !== "BYE").map((m, i) => (
          <Card key={i} style={{ marginBottom: 6, padding: "8px 12px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, fontSize: 13 }}>
              <span style={{ fontWeight: 600, color: m.scoreA > m.scoreB ? C.green : C.white, flex: 1, textAlign: "right" }}>{m.a}</span>
              <span style={{ fontWeight: 900, fontFamily: MONO, color: C.white }}>{m.scoreA}:{m.scoreB}</span>
              <span style={{ fontWeight: 600, color: m.scoreB > m.scoreA ? C.green : C.white, flex: 1, textAlign: "left" }}>{m.b}</span>
            </div>
          </Card>
        ))}
        <PressBtn full bg={C.card} onClick={fullReset} style={{ marginTop: 12 }}>Новый турнир</PressBtn>
      </div>
    );
  }
  return null;
}


/* ═══════════════════════════════════
   HISTORY SCREEN
   ═══════════════════════════════════ */
function HistoryScreen({ sessions }) {
  if (!sessions.length) return (
    <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", padding: 40 }}>
      <BballIcon size={48} />
      <div style={{ fontSize: 16, fontWeight: 700, color: C.white, marginTop: 16 }}>Пока пусто</div>
      <div style={{ fontSize: 13, color: C.gray, marginTop: 4, textAlign: "center" }}>Завершите тренировку или матч — они появятся здесь</div>
    </div>
  );

  const sorted = [...sessions].sort((a, b) => b.date - a.date);
  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px" }}>
      {sorted.map((s, i) => {
        const d = new Date(s.date);
        const dateStr = d.toLocaleDateString("ru-RU", { day: "numeric", month: "short" });
        const timeStr = d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });

        if (s.type === "training") {
          return (
            <Card key={i} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.white }}>🏀 Тренировка</div>
                  <div style={{ fontSize: 11, color: C.gray }}>{dateStr}, {timeStr} · {fmtTimeFull(s.timer)}</div>
                </div>
                <div style={{ fontSize: 24, fontWeight: 900, fontFamily: MONO, color: s.totalPct >= 60 ? C.green : C.orange }}>{s.totalPct}%</div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                {[{ v: s.totalMade, l: "попал", c: C.green }, { v: s.totalMissed, l: "мимо", c: C.red }, { v: s.totalMade + s.totalMissed, l: "всего", c: C.white }].map((d, j) => (
                  <div key={j} style={{ flex: 1, background: C.bgLight, borderRadius: 8, padding: "5px 6px", textAlign: "center" }}>
                    <div style={{ fontSize: 16, fontWeight: 700, fontFamily: MONO, color: d.c }}>{d.v}</div>
                    <div style={{ fontSize: 9, color: C.gray }}>{d.l}</div>
                  </div>
                ))}
              </div>
            </Card>
          );
        }
        if (s.type === "friendly") {
          const winner = s.teamA.score > s.teamB.score ? s.teamA.name : s.teamB.score > s.teamA.score ? s.teamB.name : "Ничья";
          return (
            <Card key={i} style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.white, marginBottom: 4 }}>🤝 Товарищеский матч</div>
              <div style={{ fontSize: 11, color: C.gray, marginBottom: 8 }}>{dateStr}, {timeStr}</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.white, flex: 1, textAlign: "right" }}>{s.teamA.name}</span>
                <span style={{ fontSize: 20, fontWeight: 900, fontFamily: MONO, color: C.white }}>{s.teamA.score}:{s.teamB.score}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.white, flex: 1, textAlign: "left" }}>{s.teamB.name}</span>
              </div>
              <div style={{ fontSize: 11, color: C.green, textAlign: "center", marginTop: 6 }}>🏆 {winner}</div>
            </Card>
          );
        }
        if (s.type === "tournament") {
          return (
            <Card key={i} style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.white, marginBottom: 4 }}>🏆 Турнир ({s.bracketType === "olympic" ? "олимпийская" : "круговая"})</div>
              <div style={{ fontSize: 11, color: C.gray, marginBottom: 8 }}>{dateStr}, {timeStr} · {s.teams.length} команд</div>
              {s.matches.filter(m => m.done && m.b !== "BYE").map((m, j) => (
                <div key={j} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "3px 0", fontSize: 12 }}>
                  <span style={{ color: m.scoreA > m.scoreB ? C.green : C.white, flex: 1, textAlign: "right", fontWeight: 600 }}>{m.a}</span>
                  <span style={{ fontWeight: 900, fontFamily: MONO, color: C.white }}>{m.scoreA}:{m.scoreB}</span>
                  <span style={{ color: m.scoreB > m.scoreA ? C.green : C.white, flex: 1, textAlign: "left", fontWeight: 600 }}>{m.b}</span>
                </div>
              ))}
            </Card>
          );
        }
        return null;
      })}
    </div>
  );
}


/* ═══════════════════════════════════
   PROFILE SCREEN
   ═══════════════════════════════════ */
function ProfileScreen({ sessions }) {
  const trainings = sessions.filter(s => s.type === "training");
  const games = sessions.filter(s => s.type === "friendly" || s.type === "tournament");
  const avgPct = trainings.length > 0 ? Math.round(trainings.reduce((a, b) => a + b.totalPct, 0) / trainings.length) : 0;
  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px" }}>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ width: 80, height: 80, borderRadius: "50%", background: C.card, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
          <BballIcon size={40} active />
        </div>
        <div style={{ fontSize: 20, fontWeight: 800, color: C.white }}>Игрок</div>
      </div>
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          {[{ l: "Тренировок", v: trainings.length }, { l: "Игр", v: games.length }, { l: "Точность", v: `${avgPct}%` }].map((s, i) => (
            <div key={i} style={{ textAlign: "center", padding: "8px 0" }}>
              <div style={{ fontSize: 22, fontWeight: 800, fontFamily: MONO, color: C.white }}>{s.v}</div>
              <div style={{ fontSize: 10, color: C.gray }}>{s.l}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card>
        {["Настройки", "Экспорт данных", "О приложении"].map((label, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "14px 0", borderBottom: i < 2 ? `1px solid ${C.bgLight}` : "none", fontSize: 14, color: C.white, cursor: "pointer" }}>
            <span>{label}</span><span style={{ color: C.gray }}>›</span>
          </div>
        ))}
      </Card>
    </div>
  );
}


/* ═══════════════════════════════════
   MAIN SHELL
   ═══════════════════════════════════ */
function ShotTrackerApp() {
  const [tab, setTab] = useState("training");
  const [sessions, setSessions] = useState([]);
  const saveSession = useCallback((s) => setSessions(prev => [...prev, s]), []);

  return (
    <div style={{
      width: "100%", height: "100vh", height: "100dvh", maxWidth: 480, margin: "0 auto",
      background: C.bg, fontFamily: FONT, display: "flex", flexDirection: "column", overflow: "hidden",
    }}>
      <div style={{ paddingTop: "env(safe-area-inset-top, 12px)", background: C.bg, flexShrink: 0 }} />
      <div style={{ padding: "4px 20px 10px", background: C.bg, flexShrink: 0 }}>
        <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: "-0.02em", color: C.white }}>
          {tab === "training" && "Тренировка"}
          {tab === "game" && "Матч"}
          {tab === "history" && "История"}
          {tab === "profile" && "Профиль"}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch", display: "flex", flexDirection: "column" }}>
        {tab === "training" && <TrainingScreen onSaveSession={saveSession} />}
        {tab === "game" && <GameScreen onSaveSession={saveSession} />}
        {tab === "history" && <HistoryScreen sessions={sessions} />}
        {tab === "profile" && <ProfileScreen sessions={sessions} />}
      </div>
      <div style={{ flexShrink: 0, background: C.dark, paddingBottom: "env(safe-area-inset-bottom, 0px)" }}>
        <TabBar active={tab} onTab={setTab} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ShotTrackerApp />);
</script>
